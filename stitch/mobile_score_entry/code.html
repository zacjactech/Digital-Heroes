<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Digital Heroes - Enter Score</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&amp;family=JetBrains+Mono:wght@400;500;700&amp;family=Playfair+Display:ital,wght@0,400;0,700;0,800;1,400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-container-high": "#2e2923",
                      "inverse-primary": "#7f570b",
                      "surface-variant": "#39342d",
                      "on-primary": "#442c00",
                      "secondary-container": "#017d54",
                      "inverse-on-surface": "#353029",
                      "surface-container-lowest": "#110e08",
                      "primary-fixed": "#ffddb0",
                      "outline-variant": "#4f4538",
                      "on-surface": "#ebe1d7",
                      "on-error": "#690005",
                      "inverse-surface": "#ebe1d7",
                      "surface-container-highest": "#39342d",
                      "on-secondary-container": "#bbffd9",
                      "on-tertiary-container": "#003961",
                      "error-container": "#93000a",
                      "on-tertiary-fixed": "#001d35",
                      "surface-tint": "#f3bd6b",
                      "on-secondary": "#003824",
                      "secondary-fixed": "#93f6c4",
                      "primary-fixed-dim": "#f3bd6b",
                      "on-surface-variant": "#d3c4b3",
                      "tertiary-container": "#77a3d5",
                      "on-secondary-fixed-variant": "#005236",
                      "surface-container": "#231f19",
                      "on-error-container": "#ffdad6",
                      "on-tertiary-fixed-variant": "#144976",
                      "surface-bright": "#3e3832",
                      "outline": "#9c8f7f",
                      "on-secondary-fixed": "#002113",
                      "on-tertiary": "#003257",
                      "error": "#ffb4ab",
                      "tertiary-fixed-dim": "#9ecafe",
                      "tertiary": "#9ecafe",
                      "on-primary-fixed-variant": "#614000",
                      "background": "#17130d",
                      "secondary": "#77d9a9",
                      "primary": "#f3bd6b",
                      "primary-container": "#c89749",
                      "surface-dim": "#17130d",
                      "surface-container-low": "#1f1b15",
                      "surface": "#17130d",
                      "tertiary-fixed": "#d1e4ff",
                      "on-primary-container": "#4c3100",
                      "on-background": "#ebe1d7",
                      "secondary-fixed-dim": "#77d9a9",
                      "on-primary-fixed": "#281800"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "spacing": {
                      "gutter": "32px",
                      "element-gap": "24px",
                      "container-max": "1280px",
                      "section-padding": "120px",
                      "unit": "8px"
              },
              "fontFamily": {
                      "stat-display": [
                              "JetBrains Mono"
                      ],
                      "label-caps": [
                              "DM Sans"
                      ],
                      "section-h2": [
                              "DM Sans"
                      ],
                      "body-lg": [
                              "DM Sans"
                      ],
                      "subhead-h3": [
                              "DM Sans"
                      ],
                      "body-md": [
                              "DM Sans"
                      ],
                      "hero-h1": [
                              "Playfair Display"
                      ]
              },
              "fontSize": {
                      "stat-display": [
                              "24px",
                              {
                                      "lineHeight": "1.0",
                                      "letterSpacing": "-0.04em",
                                      "fontWeight": "500"
                              }
                      ],
                      "label-caps": [
                              "12px",
                              {
                                      "lineHeight": "1.2",
                                      "letterSpacing": "0.1em",
                                      "fontWeight": "700"
                              }
                      ],
                      "section-h2": [
                              "32px",
                              {
                                      "lineHeight": "1.3",
                                      "letterSpacing": "-0.01em",
                                      "fontWeight": "700"
                              }
                      ],
                      "body-lg": [
                              "18px",
                              {
                                      "lineHeight": "1.6",
                                      "fontWeight": "400"
                              }
                      ],
                      "subhead-h3": [
                              "20px",
                              {
                                      "lineHeight": "1.4",
                                      "fontWeight": "700"
                              }
                      ],
                      "body-md": [
                              "16px",
                              {
                                      "lineHeight": "1.6",
                                      "fontWeight": "400"
                              }
                      ],
                      "hero-h1": [
                              "72px",
                              {
                                      "lineHeight": "1.1",
                                      "letterSpacing": "-0.02em",
                                      "fontWeight": "800"
                              }
                      ]
              }
      },
          },
        }
      </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md text-body-md antialiased pb-24 md:pb-0">
<!-- Top App Bar -->
<header class="flex justify-between items-center px-6 h-16 w-full docked full-width top-0 bg-[#1A3C34] dark:bg-[#1A3C34] border-b-[0.5px] border-[#C89749] flat no shadows fixed z-40 md:hidden">
<button class="hover:opacity-80 transition-opacity flex items-center justify-center text-[#C89749]">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="font-hero-h1 tracking-widest uppercase text-[#C89749] text-lg font-serif italic tracking-tighter">DIGITAL HEROES</h1>
<div class="w-6"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content -->
<main class="flex-grow pt-20 md:pt-8 px-[20px] flex flex-col w-full max-w-md mx-auto relative md:max-w-2xl lg:max-w-4xl">
<!-- Header -->
<div class="mb-8 md:mb-12 text-center md:text-left mt-4 md:mt-0">
<h2 class="font-section-h2 text-section-h2 text-on-background">Enter Your Score</h2>
</div>
<!-- Score Entry Area -->
<section class="flex-grow flex flex-col justify-center items-center py-10 md:py-20 bg-surface-container rounded-xl border border-outline-variant mb-8 px-4">
<!-- Date Selection -->
<div class="w-full max-w-[240px] mb-12">
<div class="relative">
<input class="w-full bg-transparent border-0 border-b border-[#D0E8DC] focus:border-primary focus:ring-0 text-center font-subhead-h3 text-subhead-h3 text-on-surface cursor-pointer pb-2" readonly="" type="text" value="Today, 24 Oct"/>
<span class="material-symbols-outlined absolute right-0 top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none text-sm" data-icon="calendar_today">calendar_today</span>
</div>
</div>
<!-- Main Score Input -->
<div class="flex items-center justify-center gap-8 md:gap-12 w-full">
<button class="w-14 h-14 md:w-16 md:h-16 rounded-full border border-primary-container text-primary-container flex items-center justify-center hover:bg-primary-container/10 transition-colors shrink-0">
<span class="material-symbols-outlined text-3xl" data-icon="remove">remove</span>
</button>
<div class="flex flex-col items-center min-w-[120px]">
<span class="font-stat-display text-stat-display text-[72px] md:text-[96px] leading-none text-on-background">72</span>
<span class="font-label-caps text-label-caps text-outline mt-2 uppercase tracking-widest">Par 72</span>
</div>
<button class="w-14 h-14 md:w-16 md:h-16 rounded-full border border-primary-container text-primary-container flex items-center justify-center hover:bg-primary-container/10 transition-colors shrink-0">
<span class="material-symbols-outlined text-3xl" data-icon="add">add</span>
</button>
</div>
<div class="mt-8 pt-6 border-t border-outline-variant/30 w-full max-w-[280px] flex justify-between items-center px-4">
<div class="text-center">
<div class="font-label-caps text-label-caps text-outline uppercase">Front 9</div>
<div class="font-stat-display text-stat-display text-on-surface mt-1">36</div>
</div>
<div class="h-8 w-[1px] bg-outline-variant"></div>
<div class="text-center">
<div class="font-label-caps text-label-caps text-outline uppercase">Back 9</div>
<div class="font-stat-display text-stat-display text-on-surface mt-1">36</div>
</div>
</div>
</section>
<!-- Rolling Scores / History (Horizontal Scroll) -->
<div class="mb-10 w-full">
<h3 class="font-label-caps text-label-caps text-outline mb-4 uppercase tracking-widest pl-1">Recent Rounds</h3>
<div class="flex overflow-x-auto gap-4 pb-4 -mx-[20px] px-[20px] snap-x hide-scrollbar">
<!-- Card 1 -->
<div class="shrink-0 w-32 bg-surface-container-low rounded-lg p-4 border border-outline-variant/50 snap-start flex flex-col items-center justify-center">
<div class="font-label-caps text-label-caps text-outline mb-2">20 OCT</div>
<div class="font-stat-display text-stat-display text-on-background">74</div>
<div class="mt-2 text-[10px] font-label-caps text-primary uppercase">+2</div>
</div>
<!-- Card 2 -->
<div class="shrink-0 w-32 bg-surface-container-low rounded-lg p-4 border border-outline-variant/50 snap-start flex flex-col items-center justify-center">
<div class="font-label-caps text-label-caps text-outline mb-2">15 OCT</div>
<div class="font-stat-display text-stat-display text-on-background">71</div>
<div class="mt-2 text-[10px] font-label-caps text-secondary uppercase bg-secondary/10 px-2 py-0.5 rounded-full">-1</div>
</div>
<!-- Card 3 -->
<div class="shrink-0 w-32 bg-surface-container-low rounded-lg p-4 border border-outline-variant/50 snap-start flex flex-col items-center justify-center">
<div class="font-label-caps text-label-caps text-outline mb-2">10 OCT</div>
<div class="font-stat-display text-stat-display text-on-background">76</div>
<div class="mt-2 text-[10px] font-label-caps text-error uppercase">+4</div>
</div>
<!-- Card 4 -->
<div class="shrink-0 w-32 bg-surface-container-low rounded-lg p-4 border border-outline-variant/50 snap-start flex flex-col items-center justify-center opacity-50">
<span class="material-symbols-outlined text-outline text-2xl mb-2" data-icon="history">history</span>
<div class="font-label-caps text-label-caps text-outline">View All</div>
</div>
</div>
</div>
<!-- Save Button -->
<button class="w-full bg-primary-container text-on-primary-container py-4 rounded font-subhead-h3 text-subhead-h3 uppercase tracking-wider hover:bg-primary transition-colors mt-auto mb-6 md:mb-12 flex justify-center items-center gap-2">
            Save Score
            <span class="material-symbols-outlined text-sm" data-icon="check">check</span>
</button>
</main>
<!-- Bottom Nav Bar (Mobile Only) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 pb-safe bg-[#1A3C34] dark:bg-[#1A3C34] border-t-[0.5px] border-[#C89749] md:hidden">
<button class="flex flex-col items-center justify-center text-[#6B8F84] h-14 hover:text-[#C89749] transition-colors w-full group">
<span class="material-symbols-outlined mb-1 group-active:scale-90 duration-200" data-icon="home">home</span>
<span class="font-serif text-[10px] uppercase tracking-widest">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-[#C89749] h-14 hover:text-[#C89749] transition-colors w-full group">
<span class="material-symbols-outlined mb-1 group-active:scale-90 duration-200" data-icon="leaderboard" data-weight="fill" style="font-variation-settings: 'FILL' 1;">leaderboard</span>
<span class="font-serif text-[10px] uppercase tracking-widest font-bold">Scores</span>
</button>
<button class="flex flex-col items-center justify-center text-[#6B8F84] h-14 hover:text-[#C89749] transition-colors w-full group">
<span class="material-symbols-outlined mb-1 group-active:scale-90 duration-200" data-icon="grid_view">grid_view</span>
<span class="font-serif text-[10px] uppercase tracking-widest">Draw</span>
</button>
<button class="flex flex-col items-center justify-center text-[#6B8F84] h-14 hover:text-[#C89749] transition-colors w-full group">
<span class="material-symbols-outlined mb-1 group-active:scale-90 duration-200" data-icon="volunteer_activism">volunteer_activism</span>
<span class="font-serif text-[10px] uppercase tracking-widest">Charity</span>
</button>
<button class="flex flex-col items-center justify-center text-[#6B8F84] h-14 hover:text-[#C89749] transition-colors w-full group">
<span class="material-symbols-outlined mb-1 group-active:scale-90 duration-200" data-icon="person">person</span>
<span class="font-serif text-[10px] uppercase tracking-widest">Profile</span>
</button>
</nav>
<style>
        /* Utility to hide scrollbar but keep functionality */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</body></html>
